services:
  auth_db:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"

  upload_db:
    image: postgres:16
    environment:
      POSTGRES_DB: upload_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5434:5432"

  feed_db:
    image: postgres:16
    environment:
      POSTGRES_DB: feed_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5435:5432"

  moderation_db:
    image: postgres:16
    environment:
      POSTGRES_DB: moderation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5436:5432"

  redis_cache:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"

  redis_queue:
    image: redis:7
    ports:
      - "127.0.0.1:6380:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  auth_service:
    build:
      context: .
      dockerfile: Dockerfile.service
    image: meethub-service:local
    working_dir: /app
    command: sh -c "python scripts/run_migrations.py auth && uvicorn services.auth_service.app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      AUTH_DATABASE_URL: postgresql+psycopg://postgres:postgres@auth_db:5432/auth_db
      AUTH_JWT_SECRET: ${JWT_SECRET}
      PYTHONPATH: /app
    depends_on:
      - auth_db
    ports:
      - "127.0.0.1:8001:8000"

  upload_service:
    build:
      context: .
      dockerfile: Dockerfile.service
    image: meethub-service:local
    working_dir: /app
    command: sh -c "python scripts/run_migrations.py upload && uvicorn services.upload_service.app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      UPLOAD_DATABASE_URL: postgresql+psycopg://postgres:postgres@upload_db:5432/upload_db
      UPLOAD_JWT_SECRET: ${JWT_SECRET}
      UPLOAD_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      UPLOAD_REDIS_QUEUE_URL: redis://redis_queue:6379/0
      UPLOAD_S3_ENDPOINT_URL: http://minio:9000
      UPLOAD_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      UPLOAD_S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      UPLOAD_S3_SECRET_KEY: ${S3_SECRET_KEY}
      UPLOAD_S3_REGION: ${S3_REGION}
      UPLOAD_S3_BUCKET_RAW: ${S3_BUCKET_RAW}
      UPLOAD_S3_BUCKET_IMAGES: ${S3_BUCKET_IMAGES:-images}
      UPLOAD_CDN_BASE_URL: http://localhost:9000
      UPLOAD_FEED_SERVICE_URL: http://feed_service:8000
      PYTHONPATH: /app
    depends_on:
      - upload_db
      - redis_queue
      - minio
      - feed_service
    ports:
      - "127.0.0.1:8002:8000"

  feed_service:
    build:
      context: .
      dockerfile: Dockerfile.service
    image: meethub-service:local
    working_dir: /app
    command: sh -c "python scripts/run_migrations.py feed && uvicorn services.feed_service.app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      FEED_DATABASE_URL: postgresql+psycopg://postgres:postgres@feed_db:5432/feed_db
      FEED_JWT_SECRET: ${JWT_SECRET}
      FEED_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      FEED_REDIS_CACHE_URL: redis://redis_cache:6379/0
      PYTHONPATH: /app
    depends_on:
      - feed_db
      - redis_cache
    ports:
      - "127.0.0.1:8003:8000"

  moderation_service:
    build:
      context: .
      dockerfile: Dockerfile.service
    image: meethub-service:local
    working_dir: /app
    command: sh -c "python scripts/run_migrations.py moderation && uvicorn services.moderation_service.app.main:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      MODERATION_DATABASE_URL: postgresql+psycopg://postgres:postgres@moderation_db:5432/moderation_db
      MODERATION_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MODERATION_ADMIN_TOKEN: ${ADMIN_TOKEN}
      MODERATION_FEED_SERVICE_URL: http://feed_service:8000
      PYTHONPATH: /app
    depends_on:
      - moderation_db
      - feed_service
    ports:
      - "127.0.0.1:8004:8000"

  transcoder_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: meethub-worker:local
    working_dir: /app
    command: python workers/transcoder/main.py
    env_file: .env
    environment:
      REDIS_QUEUE_URL: redis://redis_queue:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_RAW: ${S3_BUCKET_RAW}
      S3_BUCKET_HLS: ${S3_BUCKET_HLS}
      CDN_BASE_URL: ${CDN_BASE_URL}
      FEED_SERVICE_URL: http://feed_service:8000
      MODERATION_SERVICE_URL: http://moderation_service:8000
      UPLOAD_SERVICE_URL: http://upload_service:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PYTHONPATH: /app
    depends_on:
      - redis_queue
      - minio
      - feed_service
      - moderation_service

  gateway:
    image: traefik:v3.3
    command:
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --ping=true
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --accesslog=true
      - --log.level=INFO
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      - auth_service
      - upload_service
      - feed_service
      - moderation_service
    ports:
      - "8080:80"
      - "127.0.0.1:8081:8080"
