limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream auth_upstream {
    server auth_service:8000;
    keepalive 32;
}

upstream upload_upstream {
    server upload_service:8000;
    keepalive 32;
}

upstream feed_upstream {
    server feed_service:8000;
    keepalive 32;
}

upstream moderation_upstream {
    server moderation_service:8000;
    keepalive 32;
}

map $request_method $cors_methods {
    default "GET,POST,PUT,OPTIONS";
}

server {
    listen 80;
    client_max_body_size 100m;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Admin-Token,X-Internal-Key" always;
    add_header Access-Control-Allow-Methods $cors_methods always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location = / {
        add_header Content-Type application/json;
        return 200 '{"service":"meethub-gateway","status":"ok"}';
    }

    location /auth/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://auth_upstream;
    }

    location /upload/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://upload_upstream;
    }

    location /feed/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://feed_upstream;
    }

    location /videos/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://feed_upstream;
    }

    location /users/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://feed_upstream;
    }

    location /moderation/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://moderation_upstream;
    }
}
